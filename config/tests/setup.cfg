[coverage:run]
# uncomment the following to omit files during running
#omit =
[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main

[tox:tox]
min_version = 4.0
env_list = python3.11

[testenv]
skip_install = true
allowlist_externals = poetry
commands_pre = poetry install -E test
commands = poetry run pytest -c "config/tests/setup.cfg" tests/unitary