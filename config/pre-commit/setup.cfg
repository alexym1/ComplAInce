[flake8]
max-line-length = 120
max-complexity = 21
ignore = E203, E266, W503, E7, W6, C901, D2, D3, D4
docstring-convention = numpy
docstring_style = numpy
per-file-ignores = __init__.py:F401, D104
exclude =
    ../../../.git/*,
    ../../../__pycache__/*,
    ../../../.*,
    ../../../tests/*,
    ../../../build/*,
    ../../../dist/*,
    ../../../docs/*,
    ../../../config/*,
    ../../../notebooks/*,
    ../../../data/*,
    ../../../setup.cfg,
    ../../../*.toml,
    ../../../*.yml,
    ../../../Makefile,
    ../../../*.md,
    ../../../tests/*
min_python_version = 3.6.2
