exclude: '^(\.+|docs|htmlcov|dist|site|config|data)|coverage.xml$'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
      - id: check-case-conflict
      - id: debug-statements
  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1
    hooks:
      - id: isort
        args: [ "--profile", "black", "--settings-path", "./config/pre-commit/config.toml", "--filter-files" ]
  - repo: https://github.com/psf/black
    rev: 22.3.0
    hooks:
      - id: black
        args: ["--config","./config/pre-commit/config.toml"]
        exclude: |
         (?x)^(
            __pycache__
            | build
            | dist
            | docs
            | config
            | notebooks
            | data
            | setup.cfg$
            | .*\.toml$
            | .*\.yml$
            | Makefile
            | .*\.md$
            | tests
            | .*\.pyi$
          )
  - repo: https://github.com/pycqa/flake8
    rev: 4.0.1
    hooks:
      - id: flake8
        additional_dependencies: [flake8-print, flake8-docstrings]
        args: ["--config","./config/pre-commit/setup.cfg", "--statistics", "--count"]
        language_version: python3.10
        exclude: |
         (?x)^(
            __pycache__
            | build
            | dist
            | docs
            | config
            | notebooks
            | data
            | setup.cfg$
            | .*\.toml$
            | .*\.yml$
            | Makefile
            | .*\.md$
            | tests
            | .*\.pyi$
          )
  - repo: local
    hooks:
    - id: mypy
      name: mypy
      entry: make poetry-mypy
      language: system
      'types_or': [python, pyi]
      require_serial: true
      exclude: |
            (?x)^(
                tests
            )
